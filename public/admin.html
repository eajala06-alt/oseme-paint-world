<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oseme Paint World — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<!-- Login screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h1>Admin login</h1>
    <p style="color:var(--ink-soft)">Enter your admin password to manage the store.</p>
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn" class="btn-primary">Log in</button>
    <div id="loginError" class="error-text"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard" style="display:none">
  <aside class="sidebar">
    <div class="brand">Admin</div>
    <nav>
      <button class="nav-link active" data-tab="products">Products</button>
      <button class="nav-link" data-tab="orders">Orders</button>
      <button class="nav-link" data-tab="settings">Settings</button>
    </nav>
    <a href="/" class="nav-link" style="margin-top:auto" target="_blank">View store ↗</a>
    <button id="logoutBtn" class="nav-link" style="color:#B3452C">Log out</button>
  </aside>

  <main class="content">
    <!-- Products tab -->
    <section id="tab-products" class="tab active">
      <div class="tab-header">
        <h2>Products</h2>
        <button class="btn-primary" id="newProductBtn">+ Add product</button>
      </div>
      <table class="table">
        <thead><tr><th></th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th></th></tr></thead>
        <tbody id="productsBody"></tbody>
      </table>
    </section>

    <!-- Orders tab -->
    <section id="tab-orders" class="tab">
      <div class="tab-header"><h2>Orders</h2></div>
      <table class="table">
        <thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </section>

    <!-- Settings tab -->
    <section id="tab-settings" class="tab">
      <div class="tab-header"><h2>Settings</h2></div>
      <div class="settings-form">
        <h3 style="margin-top:0">Branding</h3>
        <div class="field">
          <label>Logo</label>
          <div id="logoPreviewWrap" style="margin-bottom:8px"></div>
          <input type="file" id="logoFile" accept="image/png,image/jpeg,image/webp,image/svg+xml">
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn-secondary" id="uploadLogoBtn" style="flex:1">Upload logo</button>
            <button class="btn-secondary" id="removeLogoBtn" style="flex:1;color:var(--danger)">Remove logo</button>
          </div>
          <div id="logoMsg" class="success-text"></div>
        </div>

        <div class="field">
          <label>Hero banner (homepage — photo or video, up to 25MB)</label>
          <div id="heroPreviewWrap" style="margin-bottom:8px"></div>
          <input type="file" id="heroFile" accept="image/png,image/jpeg,image/webp,video/mp4,video/webm,video/quicktime">
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn-secondary" id="uploadHeroBtn" style="flex:1">Upload banner</button>
            <button class="btn-secondary" id="removeHeroBtn" style="flex:1;color:var(--danger)">Remove banner</button>
          </div>
          <div id="heroMsg" class="success-text"></div>
        </div>
        <div class="field">
          <label>Top banner color (where your logo sits)</label>
          <input type="color" id="setHeaderColor" style="height:40px">
        </div>
        <div class="field">
          <label>Primary color (cart button, active filters)</label>
          <input type="color" id="setPrimaryColor" style="height:40px">
        </div>
        <div class="field">
          <label>Accent color (price tags, checkout button)</label>
          <input type="color" id="setAccentColor" style="height:40px">
        </div>

        <hr style="margin:24px 0">
        <h3>Store details</h3>
        <div class="field"><label>Store name</label><input id="setStoreName"></div>
        <div class="field"><label>WhatsApp number (with country code, digits only)</label><input id="setWhatsapp" placeholder="2348012345678"></div>
        <button class="btn-primary" id="saveSettingsBtn">Save</button>
        <div id="settingsMsg" class="success-text"></div>

        <hr style="margin:28px 0">
        <h3>Change admin password</h3>
        <div class="field"><label>New password</label><input type="password" id="newPassword"></div>
        <button class="btn-primary" id="changePassBtn">Update password</button>
        <div id="passMsg" class="success-text"></div>
      </div>
    </section>
  </main>
</div>

<!-- Product edit modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <h2 id="productModalTitle">Add product</h2>
    <input type="hidden" id="p_id">
    <div class="field"><label>Name</label><input id="p_name"></div>
    <div class="field"><label>Description</label><textarea id="p_desc" rows="2"></textarea></div>
    <div class="field"><label>Price (₦)</label><input type="number" id="p_price"></div>
    <div class="field"><label>Stock</label><input type="number" id="p_stock"></div>
    <div class="field"><label>Category</label><input id="p_category"></div>
    <div class="field"><label>Image URL</label><input id="p_image" placeholder="https://..."></div>
    <div class="field">
      <label><input type="checkbox" id="p_active" style="width:auto"> Visible on storefront</label>
    </div>
    <div id="productError" class="error-text"></div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn-primary" id="saveProductBtn">Save</button>
      <button class="btn-secondary" id="cancelProductBtn">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
