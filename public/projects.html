<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Oseme Paint World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="/config.js"></script>
</head>
<body>

<header class="site-header">
  <div class="logo-wrap" id="logoWrap">
    <span class="logo" id="storeName">Oseme Paint World</span>
  </div>
  <nav class="site-nav">
    <a href="/">Home</a>
    <a href="/shop.html">Shop</a>
    <a href="/about.html">About</a>
    <a href="/services.html">Services</a>
    <a href="/projects.html" class="active">Projects</a>
    <a href="/contact.html">Contact</a>
  </nav>
  <div class="header-actions">
    <button class="cart-btn" id="cartToggle">
      Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- Filled in by JS: either the full projects grid, or a single project's detail view -->
<div id="pageContent">
  <section class="page-heading">
    <h1>Our Projects</h1>
    <p>A look at recent work we're proud of.</p>
  </section>
  <div class="projects-grid" id="projectsGrid">Loading projects…</div>
</div>

<footer>© <span id="year"></span> <span id="storeNameFooter">Oseme Paint World</span>. All rights reserved.</footer>

<!-- Cart drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h3 style="margin:0">Your cart</h3>
    <button class="icon-btn" id="closeDrawer">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-footer">
    <div class="total-row"><span>Total</span><span id="cartTotal">₦0</span></div>
    <button class="checkout-btn" id="checkoutBtn" disabled>Checkout</button>
  </div>
</div>

<!-- Checkout modal -->
<div class="modal-overlay" id="checkoutOverlay">
  <div class="modal">
    <h2>Checkout</h2>
    <div class="field">
      <label>Full name</label>
      <input type="text" id="custName" placeholder="Ada Lovelace">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="custEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Phone (WhatsApp preferred)</label>
      <input type="tel" id="custPhone" placeholder="0803 000 0000">
    </div>
    <div class="field">
      <label>Delivery address</label>
      <textarea id="custAddress" rows="2" placeholder="Street, city, state"></textarea>
    </div>
    <div id="checkoutError" class="error-text"></div>
    <button class="checkout-btn" id="payBtn">Pay now</button>
  </div>
</div>

<!-- WhatsApp widget -->
<div class="wa-panel" id="waPanel">
  <div class="wa-head">
    <span>Chat with us</span>
    <button class="icon-btn" id="waClose" style="color:#fff">✕</button>
  </div>
  <div class="wa-body" id="waBody"></div>
  <a class="wa-cta" id="waHumanLink" href="#" target="_blank">Talk to a human on WhatsApp →</a>
</div>
<button class="wa-fab" id="waFab" aria-label="Chat on WhatsApp">
  <svg viewBox="0 0 24 24" fill="white"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.71.45 3.38 1.29 4.85L2 22l5.36-1.4a9.9 9.9 0 0 0 4.68 1.19h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.85 9.85 0 0 0 12.04 2m0 1.8a8.08 8.08 0 0 1 8.1 8.1c0 4.48-3.63 8.1-8.1 8.1a8.05 8.05 0 0 1-4.12-1.13l-.3-.17-3.18.83.85-3.1-.19-.32a8.03 8.03 0 0 1-1.24-4.31c0-4.47 3.63-8.1 8.09-8.1m-4.4 4.5c-.16 0-.42.06-.64.3-.22.24-.85.83-.85 2.03 0 1.2.87 2.35.99 2.51.12.16 1.7 2.6 4.12 3.64.58.25 1.03.4 1.38.51.58.18 1.11.16 1.53.1.47-.07 1.44-.59 1.64-1.16.2-.57.2-1.06.14-1.16-.06-.1-.22-.16-.46-.28-.24-.12-1.44-.71-1.66-.79-.22-.08-.38-.12-.55.12-.16.24-.62.79-.76.95-.14.16-.28.18-.52.06-.24-.12-1.01-.37-1.92-1.19-.71-.63-1.19-1.41-1.33-1.65-.14-.24-.01-.37.11-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.55-1.34-.76-1.83-.2-.48-.4-.42-.55-.42Z"/></svg>
</button>

<script src="/js/common.js"></script>
<script src="/js/projects.js"></script>
<script src="/js/whatsapp-widget.js"></script>
</body>
</html>
