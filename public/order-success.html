<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order confirmation — Oseme Paint World</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div style="max-width:520px;margin:80px auto;padding:0 20px;text-align:center">
  <h1 id="statusTitle">Checking your payment…</h1>
  <p id="statusText" style="color:var(--ink-soft)">Please wait a moment.</p>
  <a href="/" style="display:inline-block;margin-top:20px;color:var(--forest);font-weight:600">← Back to store</a>
</div>
<script>
  fetch('/api/settings').then(r => r.json()).then(s => {
    if (s.primaryColor) document.documentElement.style.setProperty('--forest', s.primaryColor);
    if (s.accentColor) document.documentElement.style.setProperty('--brass', s.accentColor);
  });

  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('order');
  const titleEl = document.getElementById('statusTitle');
  const textEl = document.getElementById('statusText');

  async function verify() {
    if (!orderId) {
      titleEl.textContent = 'No order found';
      return;
    }
    try {
      const res = await fetch(`/api/orders/${orderId}/verify`);
      const data = await res.json();
      if (data.status === 'paid' || data.status === 'fulfilled') {
        titleEl.textContent = 'Payment successful 🎉';
        textEl.textContent = `Your order #${orderId.slice(0,8)} is confirmed. A receipt has been sent to your email.`;
        localStorage.removeItem('cart');
      } else {
        titleEl.textContent = 'Payment not confirmed yet';
        textEl.textContent = 'If you completed payment, refresh this page in a few seconds.';
      }
    } catch (e) {
      titleEl.textContent = 'Could not verify payment';
      textEl.textContent = 'Please contact support with your order ID: ' + orderId;
    }
  }
  verify();
</script>
</body>
</html>
